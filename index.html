<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loading-screen">
    <video id="loading-video" src="loading.mp4" muted playsinline autoplay preload="auto"></video>
  </div>

  <div id="main-content">
    <div id="bg-video-container">
      <video class="bg-video" src="background.mp4" muted playsinline preload="auto"></video>
      <video class="bg-video" src="background.mp4" muted playsinline preload="auto"></video>
    </div>

    <div id="vibe-title">VIBE</div>

    <div id="music-panel">
      <div id="panel-top">
        <div id="globe-wrap">
          <div id="globe-container"></div>
        </div>
        <div id="track-info">
          <span id="track-name"></span>
          <span id="track-artist"></span>
        </div>
      </div>
      <div id="panel-ctrls">
        <button id="prev-btn" class="ctrl-btn">
          <svg viewBox="0 0 20 20" width="13" height="13">
            <polygon points="14,4 6,10 14,16" fill="#888"/>
            <rect x="4" y="4" width="2" height="12" rx="0.5" fill="#888"/>
          </svg>
        </button>
        <button id="play-btn" class="ctrl-btn">
          <span id="play-icon">
            <svg viewBox="0 0 20 20" width="14" height="14">
              <polygon points="6,3 17,10 6,17" fill="#888"/>
            </svg>
          </span>
          <span id="pause-icon" style="display:none">
            <svg viewBox="0 0 20 20" width="14" height="14">
              <rect x="4" y="3" width="4" height="14" rx="0.8" fill="#888"/>
              <rect x="12" y="3" width="4" height="14" rx="0.8" fill="#888"/>
            </svg>
          </span>
        </button>
        <button id="next-btn" class="ctrl-btn">
          <svg viewBox="0 0 20 20" width="13" height="13">
            <polygon points="6,4 14,10 6,16" fill="#888"/>
            <rect x="14" y="4" width="2" height="12" rx="0.5" fill="#888"/>
          </svg>
        </button>
      </div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
