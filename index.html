<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loading-screen">
    <video id="loading-video" src="loading.mp4" muted playsinline autoplay preload="auto"></video>
  </div>

  <div id="main-content">
    <div id="bg-video-container">
      <video class="bg-video" src="background.mp4" muted playsinline preload="auto"></video>
      <video class="bg-video" src="background.mp4" muted playsinline preload="auto"></video>
    </div>

    <div id="music-panel">
      <div id="panel-top">
        <div id="globe-wrap">
          <div id="globe-container"></div>
        </div>
        <div id="track-info">
          <span id="track-name"></span>
          <span id="track-artist"></span>
        </div>
      </div>
      <div id="panel-ctrls">
        <button id="prev-btn" class="ctrl-btn">
          <svg viewBox="0 0 20 20" width="13" height="13">
            <polygon points="14,4 6,10 14,16" fill="#888"/>
            <rect x="4" y="4" width="2" height="12" rx="0.5" fill="#888"/>
          </svg>
        </button>
        <button id="play-btn" class="ctrl-btn">
          <span id="play-icon">
            <svg viewBox="0 0 20 20" width="14" height="14">
              <polygon points="6,3 17,10 6,17" fill="#888"/>
            </svg>
          </span>
          <span id="pause-icon" style="display:none">
            <svg viewBox="0 0 20 20" width="14" height="14">
              <rect x="4" y="3" width="4" height="14" rx="0.8" fill="#888"/>
              <rect x="12" y="3" width="4" height="14" rx="0.8" fill="#888"/>
            </svg>
          </span>
        </button>
        <button id="next-btn" class="ctrl-btn">
          <svg viewBox="0 0 20 20" width="13" height="13">
            <polygon points="6,4 14,10 6,16" fill="#888"/>
            <rect x="14" y="4" width="2" height="12" rx="0.5" fill="#888"/>
          </svg>
        </button>
      </div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
  </div>

  <button id="chat-btn">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
  </button>

  <div id="chat-overlay">
    <div id="chat-panel">
      <div id="chat-header">
        <span>Chat</span>
        <span id="chat-status" style="font-size:0.65rem;color:#666;font-weight:400;"></span>
        <button id="chat-close">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-bar">
        <input id="chat-input" type="text" placeholder="Type a message..." maxlength="200">
        <button id="chat-send">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div id="admin-panel" style="display:none">
    <div id="admin-header">
      <span>Admin Panel</span>
      <button id="admin-close">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="admin-users">
      <div style="padding:10px 14px;color:#666;font-size:0.75rem;">Connected users:</div>
      <div id="admin-user-list"></div>
    </div>
    <div id="admin-chat-box">
      <div id="admin-messages"></div>
      <div id="admin-input-bar">
        <span id="admin-reply-to" style="display:none;"></span>
        <div id="admin-input-bar-inner">
          <input id="admin-input" type="text" placeholder="Reply..." maxlength="500">
          <button id="admin-send">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
