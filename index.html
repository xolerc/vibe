<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loading-screen">
    <video id="loading-video" src="loading.mp4" muted playsinline autoplay preload="auto"></video>
  </div>

  <div id="main-content">
    <div id="bg-video-container">
      <video class="bg-video" src="background.mp4" muted playsinline preload="auto"></video>
      <video class="bg-video" src="background.mp4" muted playsinline preload="auto"></video>
    </div>

    <div id="vibe-title">VIBE</div>

    <div id="music-panel">
      <button id="prev-btn" class="ctrl-btn">⏮</button>
      <div id="globe-wrap">
        <div id="globe-container"></div>
      </div>
      <button id="next-btn" class="ctrl-btn">⏭</button>
      <div id="track-info">
        <span id="track-name">VOCE NA MIRA</span>
        <span id="track-artist">Hwungii, DJ VGK1</span>
      </div>
      <button id="play-btn" class="ctrl-btn">▶</button>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
