  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "XOLERIC",
    "url": "https://xolerc.github.io/vibe/",
    "image": "https://xolerc.github.io/vibe/preview.jpg",
    "sameAs": [
      "https://github.com/Xolericuz",
      "https://instagram.com/xoleric_",

      "https://t.me/neoorg"
    ],
    "jobTitle": "AI Systems Developer",
    "description": "XOLERIC is a futuristic AI developer, digital creator, and experimental interface designer from Uzbekistan building experimental operating systems, immersive interfaces, AI platforms, and cyber-minimalist experiences.",

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loading-screen">
    <video id="loading-video" src="loading.mp4" muted playsinline autoplay preload="auto"></video>
  </div>

  <div id="page-home" class="page">
    <div id="bg-video-container">
      <video class="bg-video" src="background.mp4" muted playsinline preload="auto"></video>
      <video class="bg-video" src="background.mp4" muted playsinline preload="auto"></video>
    </div>
    <div id="home-logo">
      <svg class="logo-deco logo-deco-left" viewBox="0 0 40 80" width="40" height="80"><path d="M40 0 Q15 20 15 40 Q15 60 40 80" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.5"/></svg>
      <div class="logo-text-wrap">
        <span class="logo-line logo-line-top"></span>
        <span class="logo-main">XOLERIC</span>
        <span class="logo-line logo-line-bot"></span>
      </div>
      <svg class="logo-deco logo-deco-right" viewBox="0 0 40 80" width="40" height="80"><path d="M0 0 Q25 20 25 40 Q25 60 0 80" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.5"/></svg>
      <svg style="position:absolute;width:0;height:0"><defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8ab"/><stop offset="50%" stop-color="#6cf"/><stop offset="100%" stop-color="#a8f"/></linearGradient></defs></svg>
    </div>
    <div id="music-panel">
      <div id="panel-top">
        <div id="globe-wrap">
          <div id="globe-container"></div>
        </div>
        <div id="track-info">
          <span id="track-name"></span>
          <span id="track-artist"></span>
        </div>
      </div>
      <div id="panel-ctrls">
        <button id="prev-btn" class="ctrl-btn"><svg viewBox="0 0 20 20" width="13" height="13"><polygon points="14,4 6,10 14,16" fill="#888"/><rect x="4" y="4" width="2" height="12" rx="0.5" fill="#888"/></svg></button>
        <button id="play-btn" class="ctrl-btn">
          <span id="play-icon"><svg viewBox="0 0 20 20" width="14" height="14"><polygon points="6,3 17,10 6,17" fill="#888"/></svg></span>
          <span id="pause-icon" style="display:none"><svg viewBox="0 0 20 20" width="14" height="14"><rect x="4" y="3" width="4" height="14" rx="0.8" fill="#888"/><rect x="12" y="3" width="4" height="14" rx="0.8" fill="#888"/></svg></span>
        </button>
        <button id="next-btn" class="ctrl-btn"><svg viewBox="0 0 20 20" width="13" height="13"><polygon points="6,4 14,10 6,16" fill="#888"/><rect x="14" y="4" width="2" height="12" rx="0.5" fill="#888"/></svg></button>
      </div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
  </div>

  <div id="page-chat" class="page">
    <div id="chat-container">
      <div id="chat-header">
        <span>Chat</span>
        <span id="chat-status"></span>
      </div>
      <div id="chat-messages">
        <div class="chat-empty">No messages yet. Start a conversation!</div>
      </div>
      <div id="chat-input-bar">
        <button id="chat-emoji-btn" class="chat-act-btn">☺</button>
        <button id="chat-attach-btn" class="chat-act-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input id="chat-input" type="text" placeholder="Message..." maxlength="500">
        <button id="chat-send" class="chat-act-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9"/></svg>
        </button>
      </div>
    </div>
    <div id="emoji-picker">
      <div id="emoji-grid">😀😃😄😁😅😂🤣😊😇🙂😉😌😍🥰😘😗😋😛😜🤪😝🤑🤗🤭🤫🤔🤐🤨😐😑😶😏😒🙄😬🤥😌😔😪🤤😴😷🤒🤕🤢🤮🤧🥵🥶🥴😵🤯🤠🥳🥸😎🤓🧐😕😟🙁😮😯😲😳🥺😢😭😤😠😡🤬😈👿💀☠💩🤡👹👺👻👽👾🤖💋💌💘💝💖💗💓💞💕💟❣💔❤🧡💛💚💙💜🤎🖤🤍💯💢💥💫💦💨🕳💣💬🗨🗯💭</div>
    </div>
    <input id="file-input" type="file" accept="image/*,video/*,.pdf,.doc,.docx,.txt" style="display:none">
  </div>

  <div id="page-admin" class="page">
    <div id="admin-user-view">
      <div class="admin-view-header">
        <span>Users</span>
        <span id="admin-user-count"></span>
      </div>
      <div id="admin-user-list"></div>
    </div>
    <div id="admin-chat-view">
      <div id="admin-chat-top">
        <button id="admin-back-btn">←</button>
        <span id="admin-chat-title"></span>
        <button id="admin-delete-btn">🗑</button>
      </div>
      <div id="admin-chat-msgs">
        <div class="chat-empty">Select a user</div>
      </div>
      <div id="admin-chat-input-bar">
        <button id="admin-emoji-btn" class="chat-act-btn">☺</button>
        <button id="admin-attach-btn" class="chat-act-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input id="admin-inp" type="text" placeholder="Reply..." maxlength="500">
        <button id="admin-send" class="chat-act-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9"/></svg>
        </button>
      </div>
    </div>
    <div id="admin-emoji-picker">
      <div id="admin-emoji-grid"></div>
    </div>
    <input id="admin-file-inp" type="file" accept="image/*,video/*,.pdf,.doc,.docx,.txt" style="display:none">
  </div>

  <div id="bottom-nav">
    <button id="nav-home" class="nav-btn active">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      <span>Home</span>
    </button>

    <button id="nav-chat" class="nav-btn">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span>Chat</span>
    </button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <div id="yt-hidden-player" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none"></div>
  <script src="script.js"></script>
</body>
</html>
